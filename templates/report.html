<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research Report</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 60px auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        h1 {
            color: #333;
        }
        .date {
            color: #999;
            font-size: 13px;
            margin-bottom: 30px;
        }
        .report {
            background: white;
            padding: 24px;
            border-radius: 8px;
            border: 1px solid #ddd;
            white-space: pre-wrap;
            font-size: 15px;
            line-height: 1.6;
        }
        .back {
            display: block;
            text-align: center;
            margin-top: 30px;
            color: #555;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <h1>{{ report[0] }}</h1>
    <div class="date">{{ report[2] }}</div>
    <div class="report">{{ report[1] }}</div>
    <a class="back" href="/history">Back to History</a>
</body>
</html>
