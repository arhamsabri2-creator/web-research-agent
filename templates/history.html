<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research History</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 60px auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .report-item {
            background: white;
            padding: 16px 20px;
            margin-bottom: 12px;
            border-radius: 8px;
            border: 1px solid #ddd;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .report-item a {
            text-decoration: none;
            color: #333;
            font-size: 16px;
            font-weight: bold;
        }
        .report-item a:hover {
            color: #555;
        }
        .date {
            color: #999;
            font-size: 13px;
        }
        .back {
            display: block;
            text-align: center;
            margin-top: 30px;
            color: #555;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <h1>Research History</h1>
    {% for report in reports %}
    <div class="report-item">
        <a href="/report/{{ report[0] }}">{{ report[1] }}</a>
        <span class="date">{{ report[2] }}</span>
    </div>
    {% endfor %}
    <a class="back" href="/">Back to Research</a>
</body>
</html>
